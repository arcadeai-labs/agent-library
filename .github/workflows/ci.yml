name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run linting
        run: uv run ruff check librarian tests

      - name: Check formatting
        run: uv run ruff format --check librarian tests

      - name: Run type checking
        run: uv run mypy librarian

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          # Smoke-test on Windows to catch POSIX-only regressions (e.g. SIGALRM).
          - os: windows-latest
            python-version: "3.11"
          # Smoke-test on macOS — primary developer platform, catches BSD/Darwin quirks.
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Force uv-managed (python-build-standalone) Python. The runner's
        # pre-installed Python on macOS is compiled without
        # --enable-loadable-sqlite-extensions, so sqlite-vec fails to load.
        # python-build-standalone enables loadable sqlite extensions on
        # every platform.
        run: uv sync --extra dev --python-preference=only-managed

      - name: Run tests
        run: uv run pytest -v --cov --cov-config=pyproject.toml --cov-report=xml
        env:
          EMBEDDING_PROVIDER: local
          EMBEDDING_DIMENSION: "384"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-postgres:
    name: Tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image = stock Postgres 16 + the pgvector extension preinstalled.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: librarian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python 3.11
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: "3.11"

      - name: Install dependencies (with the postgres extra)
        run: uv sync --extra dev --extra postgres --python-preference=only-managed

      - name: Run the parameterized storage suite against Postgres
        # The same contract suite runs against SQLite in the `test` job (where
        # Postgres is skipped); here TEST_POSTGRES_DSN activates the Postgres
        # fixture so both substrates are exercised in CI.
        run: uv run pytest tests/test_storage_contract.py -v
        env:
          EMBEDDING_PROVIDER: local
          EMBEDDING_DIMENSION: "384"
          TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/librarian

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [check, test, test-postgres]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

